name: zenith 
description: A complete production-grade Flutter Android application.
publish_to: 'none'

version: 5.1.1+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  go_router: ^12.1.1
  intl: ^0.18.1
  google_fonts: ^6.1.0
  http: ^1.2.0
  fl_chart: ^0.68.0
  pdf: ^3.11.0
  printing: ^5.12.0
  local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icon.png"
  android_12:
    image: "assets/icon.png"
    icon_background_color: "#FFFFFF"


flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/images/background.jpg
    - assets/
